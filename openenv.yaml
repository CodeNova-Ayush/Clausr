name: clausr
version: "1.0.0"
entrypoint: inference.py
description: >
  Clausr is an OpenEnv reinforcement learning gym for training agents to detect
  logical contradictions in legal contracts across detection, execution/oracle,
  and incremental LexMind drafting environments.
tasks:
  - id: easy
    description: "Detection: 8-clause contract with 1 planted contradiction."
    min_score: 0.0
    max_score: 1.0
  - id: medium
    description: "Detection: 25-clause contract with 4 planted contradictions and a trap clause."
    min_score: 0.0
    max_score: 1.0
  - id: hard
    description: "Detection: 60-clause contract with 8 planted contradictions across all contradiction types and 3 traps."
    min_score: 0.0
    max_score: 1.0
  - id: execution_easy
    description: "Oracle execution: easy scenarios that activate contract clauses and may crash."
    min_score: 0.0
    max_score: 1.0
  - id: execution_medium
    description: "Oracle execution: medium scenarios requiring crash-pair identification."
    min_score: 0.0
    max_score: 1.0
  - id: execution_hard
    description: "Oracle execution: hard multi-scenario contract execution analysis."
    min_score: 0.0
    max_score: 1.0
  - id: lexmind_easy
    description: "LexMind: easy incremental drafting sequence with contradiction introduction detection."
    min_score: 0.0
    max_score: 1.0
  - id: lexmind_medium
    description: "LexMind: medium multi-round drafting sequence with subtle contradiction introductions."
    min_score: 0.0
    max_score: 1.0
  - id: lexmind_hard
    description: "LexMind: hard incremental drafting sequence requiring full event-by-event monitoring."
    min_score: 0.0
    max_score: 1.0
action_space: ContractAction | ExecutionAction | LexMindEpisodeAction
observation_space: ContractObservation | ExecutionObservation | LexMindObservation
resources:
  vcpu: 2
  memory_gb: 8
